<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TGR-IR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, "Segoe UI", sans-serif; background: #0d1117; color: #c9d1d9; display: flex; min-height: 100vh; }
  #sidebar { width: 260px; flex-shrink: 0; background: #161b22; border-right: 1px solid #30363d; padding: 16px; overflow-y: auto; }
  #sidebar h2 { font-size: 14px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; margin: 16px 0 8px; }
  #sidebar h2:first-child { margin-top: 0; }
  #sidebar a { display: block; padding: 6px 8px; color: #c9d1d9; text-decoration: none; border-radius: 6px; font-size: 14px; word-break: break-all; }
  #sidebar a:hover { background: #21262d; }
  #sidebar a.active { background: #1f6feb33; color: #58a6ff; }
  #content { flex: 1; padding: 32px 48px; max-width: 860px; overflow-y: auto; }
  #content h1, #content h2, #content h3 { border-bottom: 1px solid #30363d; padding-bottom: 8px; }
  #content code { background: #161b22; padding: 2px 6px; border-radius: 4px; }
  #content pre { background: #161b22; padding: 16px; border-radius: 8px; overflow-x: auto; }
  #content pre code { background: none; padding: 0; }
  #content table { border-collapse: collapse; width: 100%; }
  #content th, #content td { border: 1px solid #30363d; padding: 8px 12px; text-align: left; }
  #content blockquote { border-left: 4px solid #30363d; margin: 0; padding-left: 16px; color: #8b949e; }
  #loading { color: #8b949e; padding: 32px; }
  a { color: #58a6ff; }
  #toggle { display: none; }
  @media (max-width: 768px) {
    body { flex-direction: column; }
    #sidebar { width: 100%; max-height: 40vh; }
    #content { padding: 16px; }
  }
</style>
</head>
<body>
<nav id="sidebar"><div id="nav-tree">加载目录中...</div></nav>
<main id="content"><div id="loading">加载中...</div></main>

<script>
const OWNER = "divinecanon";
const REPO = "tgr-ir";
const BRANCH = "main";
const RAW_BASE = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/`;
const API_TREE = `https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${BRANCH}?recursive=1`;

async function loadTree() {
  const res = await fetch(API_TREE);
  const data = await res.json();
  const mdFiles = data.tree
    .filter(item => item.type === "blob" && item.path.startsWith("docs/") && item.path.endsWith(".md"))
    .map(item => item.path)
    .sort();

  const groups = {};
  for (const path of mdFiles) {
    const parts = path.split("/");
    const group = parts.length > 2 ? parts[1] : "spec";
    if (!groups[group]) groups[group] = [];
    groups[group].push(path);
  }

  const order = ["spec", "mapping", "proposals", "experiments", "archive"];
  const navTree = document.getElementById("nav-tree");
  navTree.innerHTML = "";
  const sortedGroups = Object.keys(groups).sort((a, b) => {
    const ai = order.indexOf(a), bi = order.indexOf(b);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });

  for (const group of sortedGroups) {
    const h2 = document.createElement("h2");
    h2.textContent = group;
    navTree.appendChild(h2);
    for (const path of groups[group]) {
      const a = document.createElement("a");
      a.href = "#" + path;
      a.textContent = path.split("/").pop();
      a.dataset.path = path;
      a.onclick = (e) => { e.preventDefault(); loadDoc(path); };
      navTree.appendChild(a);
    }
  }

  const initial = location.hash ? decodeURIComponent(location.hash.slice(1)) : "docs/00-scope.md";
  loadDoc(mdFiles.includes(initial) ? initial : mdFiles[0]);
}

async function loadDoc(path) {
  document.getElementById("content").innerHTML = '<div id="loading">加载中...</div>';
  document.querySelectorAll("#sidebar a").forEach(a => a.classList.toggle("active", a.dataset.path === path));
  location.hash = encodeURIComponent(path);
  try {
    const res = await fetch(RAW_BASE + path + "?t=" + Date.now());
    const text = await res.text();
    document.getElementById("content").innerHTML = marked.parse(text);
  } catch (e) {
    document.getElementById("content").innerHTML = "<p>加载失败：" + e.message + "</p>";
  }
}

loadTree();
</script>
</body>
</html>
